<!DOCTYPE html>
<html>
<head>
  <title>Supabase CRUD App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="container mt-5">

  <h2 class="mb-4">Hello CRUD App</h2>

  <!-- Input -->
  <div class="input-group mb-3">
    <input id="messageInput" type="text" class="form-control" placeholder="Enter message">
    <button class="btn btn-primary" onclick="addMessage()">Add</button>
  </div>

  <!-- Messages List -->
  <ul id="messageList" class="list-group"></ul>

  <script>
    const SUPABASE_URL = "https://ygrhlxsqapnasnrguraj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncmhseHNxYXBuYXNucmd1cmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDkwMjgsImV4cCI6MjA5MzAyNTAyOH0.k8337LloOGptlWTjNG7PjYXuMg-I3KKMddsumHStlXc";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // READ
    async function loadMessages() {
      const { data, error } = await client
        .from('messages')
        .select('*')
        .order('id', { ascending: false });

      const list = document.getElementById('messageList');
      list.innerHTML = "";

      data.forEach(msg => {
        list.innerHTML += `
          <li class="list-group-item d-flex justify-content-between">
            <span>${msg.text}</span>
            <div>
              <button class="btn btn-sm btn-warning" onclick="editMessage(${msg.id}, '${msg.text}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteMessage(${msg.id})">Delete</button>
            </div>
          </li>
        `;
      });
    }

    // CREATE
    async function addMessage() {
      const text = document.getElementById('messageInput').value;

      await client.from('messages').insert([{ text }]);

      document.getElementById('messageInput').value = "";
      loadMessages();
    }

    // UPDATE
    async function editMessage(id, oldText) {
      const newText = prompt("Edit message:", oldText);

      if (newText) {
        await client
          .from('messages')
          .update({ text: newText })
          .eq('id', id);

        loadMessages();
      }
    }

    // DELETE
    async function deleteMessage(id) {
      await client
        .from('messages')
        .delete()
        .eq('id', id);

      loadMessages();
    }

    // Load on start
    loadMessages();
  </script>

</body>
</html>
